<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONE 研发项目管理看板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #8892b0;
            font-size: 1rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(0, 212, 255, 0.3);
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00d4ff;
            margin-bottom: 8px;
        }
        
        .stat-label {
            color: #8892b0;
            font-size: 0.9rem;
        }
        
        .stat-card.warning .stat-value {
            color: #f59e0b;
        }
        
        .stat-card.success .stat-value {
            color: #10b981;
        }
        
        .stat-card.danger .stat-value {
            color: #ef4444;
        }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 40px;
        }
        
        .chart-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
        }
        
        .chart-card h3 {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #e2e8f0;
        }
        
        .chart-container {
            position: relative;
            height: 300px;
        }
        
        .projects-table {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            overflow-x: auto;
        }
        
        .projects-table h3 {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #e2e8f0;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        th {
            color: #8892b0;
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        td {
            font-size: 0.95rem;
        }
        
        tr:hover td {
            background: rgba(255, 255, 255, 0.03);
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        .progress-fill.high { background: linear-gradient(90deg, #10b981, #34d399); }
        .progress-fill.medium { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .progress-fill.low { background: linear-gradient(90deg, #ef4444, #f87171); }
        
        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .tag-high { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .tag-medium { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .tag-low { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        
        .footer {
            text-align: center;
            padding: 30px 0;
            color: #8892b0;
            font-size: 0.85rem;
        }
        
        @media (max-width: 1024px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .stat-value { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 ONE 研发项目管理看板</h1>
            <p class="subtitle">数据更新于 <span id="updateTime"></span></p>
        </header>
        
        <!-- 总体统计 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalProjects">0</div>
                <div class="stat-label">项目总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalTasks">0</div>
                <div class="stat-label">任务总数</div>
            </div>
            <div class="stat-card success">
                <div class="stat-value" id="completedTasks">0</div>
                <div class="stat-label">已完成</div>
            </div>
            <div class="stat-card warning">
                <div class="stat-value" id="inProgressTasks">0</div>
                <div class="stat-label">进行中</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="notStartedTasks">0</div>
                <div class="stat-label">未开始</div>
            </div>
            <div class="stat-card danger">
                <div class="stat-value" id="totalDefects">0</div>
                <div class="stat-label">缺陷数</div>
            </div>
            <div class="stat-card success">
                <div class="stat-value" id="avgCompletion">0%</div>
                <div class="stat-label">平均完成率</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalHours">0h</div>
                <div class="stat-label">总工时</div>
            </div>
        </div>
        
        <!-- 图表区域 -->
        <div class="charts-grid">
            <div class="chart-card">
                <h3>📊 项目完成率分布</h3>
                <div class="chart-container">
                    <canvas id="completionChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3>🏗️ 组件任务分布</h3>
                <div class="chart-container">
                    <canvas id="componentChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3>📈 任务状态分布</h3>
                <div class="chart-container">
                    <canvas id="statusChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3>👥 Top 10 负责人员</h3>
                <div class="chart-container">
                    <canvas id="ownerChart"></canvas>
                </div>
            </div>
        </div>
        
        <!-- 项目列表 -->
        <div class="projects-table">
            <h3>📋 项目详情</h3>
            <table>
                <thead>
                    <tr>
                        <th>项目名称</th>
                        <th>任务总数</th>
                        <th>完成率</th>
                        <th>已完成</th>
                        <th>进行中</th>
                        <th>未开始</th>
                        <th>测试中</th>
                        <th>缺陷</th>
                        <th>工时(h)</th>
                    </tr>
                </thead>
                <tbody id="projectsTable">
                </tbody>
            </table>
        </div>
        
        <div class="footer">
            <p>ONE 研发项目管理看板 | 数据自动更新</p>
        </div>
    </div>
    
    <script>
        // 项目数据
        const projectsData = [
            {
                "name": "APM-3.11.0.0-标准迭代",
                "total_tasks": 459,

                "not_started": 104,
                "in_progress": 0,
                "testing": 22,

                "total_estimated_hours": 889.0,
                "total_logged_hours": 2254.35,
                "completion_rate": 71.9
            },
            {
                "name": "ONE-ETL-V4.2.4.0-0312火车",
                "total_tasks": 292,
                "completed": 240,
                "not_started": 42,
                "in_progress": 0,
                "testing": 9,
                "fixed": 0,
                "defects": 12,
                "total_estimated_hours": 793.5,
                "total_logged_hours": 1276.2,
                "completion_rate": 82.2
            },
            {
                "name": "ONE-RUM-V3.11.0.0-0312",
                "total_tasks": 259,
                "completed": 174,
                "not_started": 61,
                "in_progress": 2,
                "testing": 14,
                "fixed": 0,
                "defects": 89,
                "total_estimated_hours": 372.5,
                "total_logged_hours": 1154.5,
                "completion_rate": 67.2
            },
            {
                "name": "IAM-V3.11.0.0-0312",
                "total_tasks": 181,
                "completed": 58,
                "not_started": 121,
                "in_progress": 0,
                "testing": 1,
                "fixed": 1,
                "defects": 9,
                "total_estimated_hours": 402.0,
                "total_logged_hours": 603.5,
                "completion_rate": 32.0
            },
            {
                "name": "ANALYSIS-V3.11.0.0-0312",
                "total_tasks": 162,
                "completed": 89,
                "not_started": 68,
                "in_progress": 4,
                "testing": 0,
                "fixed": 0,
                "defects": 23,
                "total_estimated_hours": 385.5,
                "total_logged_hours": 865.1,
                "completion_rate": 54.9
            },
            {
                "name": "Meta 2600【312火车】",
                "total_tasks": 85,
                "completed": 66,
                "not_started": 17,
                "in_progress": 0,
                "testing": 2,
                "fixed": 0,
                "defects": 25,
                "total_estimated_hours": 255.0,
                "total_logged_hours": 393.5,
                "completion_rate": 77.6
            },
            {
                "name": "Pilot-installer-V1.6.0.0-标准版本",
                "total_tasks": 68,
                "completed": 50,
                "not_started": 18,
                "in_progress": 0,
                "testing": 0,
                "fixed": 0,
                "defects": 0,
                "total_estimated_hours": 0.0,
                "total_logged_hours": 245.5,
                "completion_rate": 73.5
            },
            {
                "name": "Alert-V3.11.0.0-312规划火车",
                "total_tasks": 65,
                "completed": 46,
                "not_started": 18,
                "in_progress": 0,
                "testing": 1,
                "fixed": 0,
                "defects": 6,
                "total_estimated_hours": 226.5,
                "total_logged_hours": 260.5,
                "completion_rate": 70.8
            },
            {
                "name": "Controller-V3.11.0.0 - 标准迭代",
                "total_tasks": 53,
                "completed": 51,
                "not_started": 1,
                "in_progress": 0,
                "testing": 1,
                "fixed": 0,
                "defects": 0,
                "total_estimated_hours": 239.0,
                "total_logged_hours": 273.5,
                "completion_rate": 96.2
            },
            {
                "name": "Pilot-V2.8.8.0-标准迭代",
                "total_tasks": 22,
                "completed": 18,
                "not_started": 2,
                "in_progress": 1,
                "testing": 1,
                "fixed": 0,
                "defects": 2,
                "total_estimated_hours": 6.0,
                "total_logged_hours": 121.0,
                "completion_rate": 81.8
            },
            {
                "name": "Collector-V3.11.0.0 - 标准迭代",
                "total_tasks": 20,
                "completed": 19,
                "not_started": 1,
                "in_progress": 0,
                "testing": 0,
                "fixed": 0,
                "defects": 1,
                "total_estimated_hours": 6.0,
                "total_logged_hours": 162.0,
                "completion_rate": 95.0
            },
            {
                "name": "Android V8.30.0 - sse网络框架兼容",
                "total_tasks": 14,
                "completed": 1,
                "not_started": 13,
                "in_progress": 0,
                "testing": 0,
                "fixed": 0,
                "defects": 0,
                "total_estimated_hours": 0.0,
                "total_logged_hours": 126.0,
                "completion_rate": 7.1
            },
            {
                "name": "STM-V3.11.0..0-0312",
                "total_tasks": 11,
                "completed": 11,
                "not_started": 0,
                "in_progress": 0,
                "testing": 0,
                "fixed": 0,
                "defects": 4,
                "total_estimated_hours": 0.0,
                "total_logged_hours": 38.5,
                "completion_rate": 100.0
            },
            {
                "name": "DEPLOY-V3.11.0.0-标准迭代",
                "total_tasks": 3,
                "completed": 3,
                "not_started": 0,
                "in_progress": 0,
                "testing": 0,
                "fixed": 0,
                "defects": 0,
                "total_estimated_hours": 24.0,
                "total_logged_hours": 24.0,
                "completion_rate": 100.0
            }
        ];
        
        // 计算统计数据
        const totalProjects = projectsData.length;
        const totalTasks = projectsData.reduce((sum, p) => sum + p.total_tasks, 0);
        const completedTasks = projectsData.reduce((sum, p) => sum + p.completed, 0);
        const inProgressTasks = projectsData.reduce((sum, p) => sum + p.in_progress, 0);
        const notStartedTasks = projectsData.reduce((sum, p) => sum + p.not_started, 0);
        const testingTasks = projectsData.reduce((sum, p) => sum + p.testing, 0);
        const totalDefects = projectsData.reduce((sum, p) => sum + p.defects, 0);
        const totalHours = projectsData.reduce((sum, p) => sum + p.total_logged_hours, 0);
        const avgCompletion = (projectsData.reduce((sum, p) => sum + p.completion_rate, 0) / totalProjects).toFixed(1);
        
        // 更新统计卡片
        document.getElementById('totalProjects').textContent = totalProjects;
        document.getElementById('totalTasks').textContent = totalTasks;
        document.getElementById('completedTasks').textContent = completedTasks;
        document.getElementById('inProgressTasks').textContent = inProgressTasks + testingTasks;
        document.getElementById('notStartedTasks').textContent = notStartedTasks;
        document.getElementById('totalDefects').textContent = totalDefects;
        document.getElementById('avgCompletion').textContent = avgCompletion + '%';
        document.getElementById('totalHours').textContent = totalHours.toFixed(0) + 'h';
        
        // 更新时间
        document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN');
        
        // 项目完成率分布 - 环形图
        const highCount = projectsData.filter(p => p.completion_rate >= 80).length;
        const mediumCount = projectsData.filter(p => p.completion_rate >= 50 && p.completion_rate < 80).length;
        const lowCount = projectsData.filter(p => p.completion_rate < 50).length;
        
        new Chart(document.getElementById('completionChart'), {
            type: 'doughnut',
            data: {
                labels: ['高完成率 (≥80%)', '中完成率 (50-80%)', '低完成率 (<50%)'],
                datasets: [{
                    data: [highCount, mediumCount, lowCount],
                    backgroundColor: ['#10b981', '#f59e0b', '#ef4444'],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { color: '#8892b0' }
                    }
                }
            }
        });
        
        // 组件任务分布
        const componentData = {};
        projectsData.forEach(p => {
            const components = p.name.split('-')[0];
            componentData[components] = (componentData[components] || 0) + p.total_tasks;
        });
        
        new Chart(document.getElementById('componentChart'), {
            type: 'bar',
            data: {
                labels: Object.keys(componentData),
                datasets: [{
                    label: '任务数',
                    data: Object.values(componentData),
                    backgroundColor: [
                        '#00d4ff', '#7c3aed', '#10b981', '#f59e0b', '#ef4444',
                        '#8b5cf6', '#06b6d4', '#ec4899', '#14b8a6', '#f97316'
                    ],
                    borderRadius: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    x: { ticks: { color: '#8892b0' }, grid: { display: false } },
                    y: { ticks: { color: '#8892b0' }, grid: { color: 'rgba(255,255,255,0.1)' } }
                }
            }
        });
        
        // 任务状态分布
        new Chart(document.getElementById('statusChart'), {
            type: 'pie',
            data: {
                labels: ['已完成', '进行中', '未开始', '测试中'],
                datasets: [{
                    data: [completedTasks, inProgressTasks, notStartedTasks, testingTasks],
                    backgroundColor: ['#10b981', '#3b82f6', '#6b7280', '#f59e0b'],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { color: '#8892b0' }
                    }
                }
            }
        });
        
        // Top 10 负责人员
        const ownerData = {};
        projectsData.forEach(p => {
            if (p.owners) {
                Object.entries(p.owners).forEach(([name, count]) => {
                    ownerData[name] = (ownerData[name] || 0) + count;
                });
            }
        });
        
        const sortedOwners = Object.entries(ownerData)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 10);
        
        new Chart(document.getElementById('ownerChart'), {
            type: 'bar',
            data: {
                labels: sortedOwners.map(o => o[0]),
                datasets: [{
                    label: '任务数',
                    data: sortedOwners.map(o => o[1]),
                    backgroundColor: '#7c3aed',
                    borderRadius: 8
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    x: { ticks: { color: '#8892b0' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                    y: { ticks: { color: '#8892b0' }, grid: { display: false } }
                }
            }
        });
        
        // 填充项目表格
        const tbody = document.getElementById('projectsTable');
        projectsData.forEach(p => {
            const tr = document.createElement('tr');
            const progressClass = p.completion_rate >= 80 ? 'high' : p.completion_rate >= 50 ? 'medium' : 'low';
            const tagClass = p.completion_rate >= 80 ? 'tag-high' : p.completion_rate >= 50 ? 'tag-medium' : 'tag-low';
            
            tr.innerHTML = `
                <td><strong>${p.name}</strong></td>
                <td>${p.total_tasks}</td>
                <td>
                    <span class="tag ${tagClass}">${p.completion_rate}%</span>
                    <div class="progress-bar" style="margin-top: 6px;">
                        <div class="progress-fill ${progressClass}" style="width: ${p.completion_rate}%"></div>
                    </div>
                </td>
                <td style="color: #10b981;">${p.completed}</td>
                <td style="color: #3b82f6;">${p.in_progress}</td>
                <td style="color: #6b7280;">${p.not_started}</td>
                <td style="color: #f59e0b;">${p.testing}</td>
                <td style="color: ${p.defects > 20 ? '#ef4444' : '#8892b0'};">${p.defects}</td>
                <td>${p.total_logged_hours.toFixed(1)}</td>
            `;
            tbody.appendChild(tr);
        });
    </script>
</body>
</html>
